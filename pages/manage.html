<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Voters</title>

    <!-- main style -->
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <div class="box manage-box">

        <h2>Voter List</h2>

        <div class="table-box">
            <table class="voter-table">
                <thead>
                    <tr>
                        <th>user</th>
                        <th>User Name</th>
                        <th>Mobile</th>
                        <th>Party</th>
                        <th>Date</th>
                        <th>Select</th>
                    </tr>
                </thead>
                <tbody id="voterTableBody"></tbody>
            </table>
        </div>

        <br>

        <button class="delete-btn" onclick="deleteSelected()">
            Delete Selected
        </button>

        <br><br>
        <a href="vote.html">⬅ Back to Admin</a>

    </div>

    <!-- Toast Container -->
<div id="toastContainer"></div>

<!-- Custom Modal -->
<div id="customModal" class="custom-modal">
    <div class="modal-box">

        <h3 id="modalTitle">Alert</h3>

        <p id="modalMessage"></p>

        <div id="modalInputArea"></div>

        <div class="modal-buttons">
            <button id="modalOkBtn">OK</button>
            <button id="modalCancelBtn">Cancel</button>
        </div>

    </div>
</div>


<script src="../js/storage.js"></script>
<script src="../js/admin.js"></script>
<script src="../js/ui.js"></script>
    
    <script>
        loadVoters();
    </script>

</body>
</html>
